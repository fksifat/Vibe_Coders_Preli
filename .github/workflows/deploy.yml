name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Clean up directory if it exists but is not a git repository
            if [ -d ~/SUST_Hackathon_Preli ] && [ ! -d ~/SUST_Hackathon_Preli/.git ]; then
                echo "Directory exists but is not a git repository. Cleaning it up..."
                rm -rf ~/SUST_Hackathon_Preli
            fi

            # Clone the repository if it doesn't exist
            if [ ! -d ~/SUST_Hackathon_Preli ]; then
                echo "Cloning repository..."
                git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ~/SUST_Hackathon_Preli
            fi

            cd ~/SUST_Hackathon_Preli
            
            # Fetch latest changes
            git fetch --all
            git reset --hard origin/main
            
            # Ensure deploy script is executable
            chmod +x deploy_ec2.sh
            
            # Restart/rebuild the containers using docker-compose
            sudo docker compose up --build -d
            
            # Verify status
            sudo docker compose ps
