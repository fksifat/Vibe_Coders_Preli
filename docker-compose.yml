version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: queuestorm_app
    restart: always
    ports:
      - "80:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
